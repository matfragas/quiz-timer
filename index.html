<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Timer</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #timer { font-size: 2rem; color: red; }
        #question { margin: 20px 0; }
    </style>
</head>
<body>
    <h1>Quiz Timer</h1>
    <div id="question">Question 1 of 10</div>
    <div id="timer">00:00</div>
    <script>
        let totalTime = 600; // Total time for the quiz in seconds
        let currentTime = totalTime;
        let questionNumber = 1;

        const questionDiv = document.getElementById("question");
        const timerDiv = document.getElementById("timer");

        function updateTimer() {
            const minutes = Math.floor(currentTime / 60);
            const seconds = currentTime % 60;
            timerDiv.innerText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            currentTime--;

            if (currentTime < 0) {
                clearInterval(interval);
                alert('Time is up!');
            }
        }

        const interval = setInterval(updateTimer, 1000);
    </script>
</body>
</html>
